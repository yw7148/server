apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oci-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: oci-platform
  source:
    repoURL: https://github.com/yw7148/server.git
    targetRevision: HEAD
    path: clusters/oci-prod
  destination:
    name: oci-prod
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
