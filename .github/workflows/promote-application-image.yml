name: Promote Application Image

on:
  workflow_dispatch:
    inputs:
      application:
        description: Name of the application to promote.
        required: true
        type: choice
        options:
          -  
      image_tag:
        description: Docker tag to promote into the production overlay.
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update production image tag
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          APPLICATION: ${{ inputs.application }}
        run: |
          sed -i "s/^    newTag: .*/    newTag: ${IMAGE_TAG}/" apps/${APPLICATION}/overlays/prod/kustomization.yaml

      - name: Commit manifest update
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          APPLICATION: ${{ inputs.application }}
        run: |
          if git diff --quiet -- apps/${APPLICATION}/overlays/prod/kustomization.yaml; then
            echo "No manifest change detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/${APPLICATION}/overlays/prod/kustomization.yaml
          git commit -m "chore(${APPLICATION}): promote image to ${IMAGE_TAG}"
          git push
